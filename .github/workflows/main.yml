name: Stock Screener

on:
  schedule:
    # Heures stratégiques : vérification toutes les 15 min
    # Pré-ouverture / ouverture Europe
    - cron: "*/15 7-9 * * 1-5"
    # Ouverture marché US
    - cron: "*/15 13-15 * * 1-5"
    # Clôture US / dernière heure de trading
    - cron: "*/15 20-22 * * 1-5"
    # Reste de la journée : vérification classique toutes les heures
    - cron: "0 8-22 * * 1-5"
    # Récap quotidien à 21h UTC (~23h heure de Paris en été)
    - cron: "0 21 * * 1-5"
  workflow_dispatch:      # permet de lancer manuellement depuis GitHub
    inputs:
      mode:
        description: "Mode : check (alerte) / summary (récap) / test (exemples factices)"
        required: false
        default: "summary"
        type: choice
        options:
          - check
          - summary
          - test

jobs:
  run-screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour committer le fichier d'état
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "21" ]; then
              echo "mode=summary" >> $GITHUB_OUTPUT
            else
              echo "mode=check" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run screener
        env:
          DISCORD_WEBHOOK_BUY: ${{ secrets.DISCORD_WEBHOOK_BUY }}
          DISCORD_WEBHOOK_SHORT: ${{ secrets.DISCORD_WEBHOOK_SHORT }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
          DISCORD_WEBHOOK_OPPORTUNITIES: ${{ secrets.DISCORD_WEBHOOK_OPPORTUNITIES }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_MODE: ${{ steps.mode.outputs.mode }}
        run: python stock_screener.py

      - name: Commit updated state file
        run: |
          git config user.name "screener-bot"
          git config user.email "screener-bot@users.noreply.github.com"
          git add stock_state.json
          git diff --quiet --cached || git commit -m "Update state [skip ci]"
          git pull --rebase origin main || true
          git push
